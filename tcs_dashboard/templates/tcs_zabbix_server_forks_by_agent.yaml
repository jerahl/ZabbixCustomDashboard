zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 9b0776b3d5c3a2b53a02200e06845609
      name: Templates/Applications
  templates:
    - uuid: 3bfcf5482feb3bfeb58475ffed253038
      template: 'TCS Zabbix server forks by agent active'
      name: 'TCS Zabbix server forks by agent active'
      description: |
        Companion to the stock "Zabbix server health" template that pulls the
        running fork count for every Zabbix server process type via the active
        Zabbix agent. Pair with "Zabbix agent active" on the host running
        zabbix-server, then the TCS Server Status dashboard will show real fork
        counts next to each process's %busy bar.

        Items use proc.num[,,, <cmdline regex>] matching the standard
        "zabbix_server: <type> #" cmdline pattern. Requires Zabbix agent
        (active) on the server host with hostname matching the server's host
        entry in Zabbix.
      groups:
        - name: Templates/Applications
      items:
        - uuid: 1418f564b4173febb612a5f2e5d062a1
          name: 'Zabbix server forks · agent poller'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,,,"zabbix_server: agent poller #"]'
          delay: 5m
          history: 7d
          trends: 30d
          description: 'Running fork count for the Zabbix server "agent poller" process type.'
          tags:
            - tag: component
              value: zabbix-server-forks
            - tag: process
              value: 'agent poller'
